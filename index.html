<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Super To Do List</title>

<style>

body{
font-family:Poppins;
background:#0b0b0b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.container{
width:700px;
background:#111;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 20px #000;
}

/* logout */

.topbar{
display:flex;
justify-content:flex-end;
padding:8px 15px;
background:#111;
border-bottom:1px solid #222;
}

.topbar a{
font-size:12px;
text-decoration:none;
color:gold;
padding:4px 10px;
border:1px solid gold;
border-radius:5px;
}

.topbar a:hover{
background:gold;
color:black;
}

/* header */

.header{
background:linear-gradient(135deg,#000,#c9a227);
padding:25px;
text-align:center;
}

.header h1{
margin:0;
}

.header p{
margin:5px 0 0;
font-size:14px;
color:#eee;
}

/* form */

.form{
padding:20px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

input,select{
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:#1c1c1c;
color:white;
}

button{
padding:12px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#c9a227,#ffd700);
color:black;
font-weight:bold;
cursor:pointer;
width:100%;
}

/* filter */

.filters{
display:flex;
gap:10px;
padding:10px 20px;
border-top:1px solid #222;
border-bottom:1px solid #222;
}

.filter{
background:#1c1c1c;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.filter.active{
background:gold;
color:black;
}

/* task */

.tasks{
padding:20px;
}

.task{
background:#1a1a1a;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.task.done .title{
text-decoration:line-through;
color:#888;
}

.task-top{
display:flex;
justify-content:space-between;
}

.actions button{
width:auto;
padding:5px 10px;
margin-left:5px;
font-size:12px;
}

.done{background:gold;color:black;}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}

small{
color:#bbb;
}

/* statistik */

.stats{
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid #222;
background:#0d0d0d;
text-align:center;
}

.stats h2{
margin:0;
color:gold;
}

.stats p{
margin:0;
font-size:12px;
color:#aaa;
}

.empty{
text-align:center;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="header">
<h1>Super To-Do List</h1>
<p>Kelola tugas Anda dengan mudah</p>
</div>

<div class="form">

<div class="row">
<input type="text" id="taskInput" placeholder="Apa yang perlu dilakukan?">

<select id="category">
<option>Pribadi</option>
<option>Pekerjaan</option>
<option>Belanja</option>
</select>
</div>

<div class="row">
<input type="datetime-local" id="deadline">
</div>

<button onclick="addTask()">Tambah Tugas</button>

</div>

<div class="filters">
<div class="filter active" onclick="setFilter('all',event)">Semua</div>
<div class="filter" onclick="setFilter('active',event)">Aktif</div>
<div class="filter" onclick="setFilter('done',event)">Selesai</div>
</div>

<div class="tasks" id="taskList"></div>

<div class="stats">

<div>
<h2 id="totalTask">0</h2>
<p>Total Tugas</p>
</div>

<div>
<h2 id="activeTask">0</h2>
<p>Tugas Aktif</p>
</div>

<div>
<h2 id="doneTask">0</h2>
<p>Tugas Selesai</p>
</div>

</div>

</div>

<script>

/* cek login */
if(localStorage.getItem("login")!=="true"){
window.location="login.html"
}

let tasks=[]
let filter="all"

function logout(){

if(confirm("Yakin ingin logout?")){
localStorage.removeItem("login")
window.location="login.html"
}

}

function addTask(){

let name=document.getElementById("taskInput").value
let category=document.getElementById("category").value
let deadline=document.getElementById("deadline").value

if(name===""){
alert("Masukkan tugas dulu")
return
}

tasks.push({
name,
category,
deadline,
done:false
})

document.getElementById("taskInput").value=""

render()

}

function render(){

const list=document.getElementById("taskList")
list.innerHTML=""

let filtered=tasks.filter(task=>{
if(filter==="active") return !task.done
if(filter==="done") return task.done
return true
})

if(filtered.length===0){
list.innerHTML=`<div class="empty">Tidak ada tugas</div>`
}

filtered.forEach((task,index)=>{

const div=document.createElement("div")
div.className="task"+(task.done?" done":"")

div.innerHTML=`

<div class="task-top">
<div class="title">${task.name}</div>

<div class="actions">

<button class="done" onclick="toggleDone(${index})">✔</button>

<button class="edit" onclick="editTask(${index})">Edit</button>

<button class="delete" onclick="deleteTask(${index})">Hapus</button>

</div>
</div>

<small>
${task.category} | ${task.deadline}
</small>

`

list.appendChild(div)

})

updateStats()

}

function deleteTask(i){
tasks.splice(i,1)
render()
}

function toggleDone(i){
tasks[i].done=!tasks[i].done
render()
}

function editTask(i){

let newTask=prompt("Edit tugas",tasks[i].name)

if(newTask){
tasks[i].name=newTask
render()
}

}

function setFilter(type,event){

filter=type

document.querySelectorAll(".filter").forEach(btn=>{
btn.classList.remove("active")
})

event.target.classList.add("active")

render()

}

function updateStats(){

let total=tasks.length
let done=tasks.filter(t=>t.done).length
let active=total-done

document.getElementById("totalTask").innerText=total
document.getElementById("doneTask").innerText=done
document.getElementById("activeTask").innerText=active

}

</script>

</body>
</html>
